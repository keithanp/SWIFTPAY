<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiftpay — Instant advances on App Store revenue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          },
        },
      };
    </script>
    <!--
      Import map (reference): in a no-bundler setup you would map:
      react, react-dom/client, lucide-react, recharts, @google/genai → ESM CDN URLs.
      This project uses Vite, which resolves those packages from node_modules at build time.
    -->
    <style>
      * {
        scrollbar-width: thin;
        scrollbar-color: rgb(148 163 184) rgb(241 245 249);
      }
      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-track {
        background: rgb(241 245 249);
        border-radius: 9999px;
      }
      *::-webkit-scrollbar-thumb {
        background: rgb(148 163 184);
        border-radius: 9999px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: rgb(100 116 139);
      }
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background-color: rgb(248 250 252);
        color: rgb(15 23 42);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
