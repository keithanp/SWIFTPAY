services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swiftpay
      POSTGRES_PASSWORD: swiftpay
      POSTGRES_DB: swiftpay
    ports:
      - '5432:5432'
    volumes:
      - swiftpay_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U swiftpay -d swiftpay']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  swiftpay_pg:
